<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Vision 360</title>

    <link rel="stylesheet" href="../css/style.css?v=1.1" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        .login-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        .login-card {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 20px;
            color: #00d2d3;
        }

        .login-card p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            outline: none;
        }

        .form-group input:focus {
            border-color: #00d2d3;
        }

        .btn-block {
            width: 100%;
            margin-bottom: 15px;
        }

        #error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="container nav-container">
            <h1 class="logo">Vision <span>360</span></h1>
            <nav class="navbar">
                <ul class="nav-links">
                    <li><a href="../index.html">Back to Home</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-section">
        <div class="login-card">
            <h2>Admin Login</h2>
            <p>Sign in to access the dashboard</p>

            <div id="error-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@vision360.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Sign In
                </button>
                <button type="button" id="google-login-btn" class="btn btn-outline btn-block">
                    <i class="fab fa-google"></i> Sign In with Google
                </button>
            </form>
        </div>
    </section>

    <!-- Use modular import for Firebase JS integration -->
    <script type="module" src="../js/admin-login.js"></script>

</body>

</html>
