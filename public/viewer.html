<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision 360 – Viewer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <style>
        /* Viewer-specific overrides */
        .viewer-hint {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(7,13,26,0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50px;
            color: rgba(255,255,255,0.5);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            white-space: nowrap;
            animation: hintFadeOut 1s 4s ease forwards;
            font-family: 'Outfit', sans-serif;
        }

        @keyframes hintFadeOut {
            to { opacity: 0; transform: translateX(-50%) translateY(10px); }
        }

        /* Breadcrumb trail */
        .viewer-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
        }

        .viewer-breadcrumb i { font-size: 0.7rem; }

        /* Scene counter badge */
        .scene-type-badge {
            padding: 4px 12px;
            background: rgba(0, 242, 254, 0.12);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--c-primary);
            backdrop-filter: blur(8px);
        }

        /* Scene info sidebar */
        .viewer-title-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        /* Loading spinner brand */
        .loading-logo {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        .loading-logo span {
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>
    <div class="viewer-container">

        <!-- Loading overlay -->
        <div id="loading-overlay">
            <div class="loader-ring"></div>
            <p class="loading-logo">Vision <span>360</span></p>
            <p>Loading panorama...</p>
        </div>

        <!-- Pannellum attaches here -->
        <div id="panorama"></div>

        <!-- UI overlay -->
        <div class="viewer-ui">
            <div class="viewer-header">

                <!-- Back button -->
                <a href="index.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>

                <!-- Scene info -->
                <div class="viewer-title-wrap">
                    <div class="scene-title" id="current-scene-title">Loading...</div>
                    <div class="scene-type-badge" id="current-scene-type">360° View</div>
                </div>

                <!-- Spacer to balance flex -->
                <div style="width: 120px;"></div>

            </div>

            <!-- Drag hint (auto-fades) -->
            <div class="viewer-hint">
                <i class="fas fa-mouse"></i>
                Click &amp; drag to look around — click hotspots to navigate
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script type="module" src="js/viewer.js"></script>
</body>
</html>
